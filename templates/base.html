<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo|default:"NCC | NetCommander" }}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --brand-color: #764ba2;
            --dark-bg: #1a1d20;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #334155;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .navbar-dark-custom {
            background-color: var(--dark-bg) !important;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Estilo para códigos e terminais em todo o sistema */
        code, pre {
            font-family: 'JetBrains Mono', monospace !important;
        }

        .footer {
            margin-top: 5rem;
            padding: 2rem 0;
            border-top: 1px solid #e2e8f0;
            color: #94a3b8;
        }

        /* Ajuste fino para botões arredondados */
        .btn { border-radius: 8px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-dark-custom mb-4 shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fs-4" href="{% url 'home' %}">
                <i class="bi bi-terminal-fill me-2" style="-webkit-text-fill-color: var(--brand-color);"></i>
                NCC<span class="text-white-50 ms-1">NetCommander</span>
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link px-3 {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'home' %}">
                            <i class="bi bi-grid-1x2 me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <span class="badge bg-success-subtle text-success border border-success-subtle px-3 py-2">
                            <i class="bi bi-shield-check me-1"></i> ncc@ip
                        </span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="min-vh-100">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer bg-white mt-auto">
        <div class="container text-center">
            <p class="mb-0 small">
                <strong>NetCommander NCC</strong> &copy; 2026 | 
                <span class="ms-1">Gestão de Laboratórios via <code>SSH</code> & <code>PsExec</code></span>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
        const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))
    </script>
</body>
</html>
